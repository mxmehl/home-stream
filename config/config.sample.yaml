# Path to a directory where the media files are stored. The directory must be accessible by the user
# running this application
media_root: /media/data
# Extensions of video and audio files to be served. The application will only serve files with these
# extensions
video_extensions:
  - avi
  - mkv
  - mp4
  - webm
audio_extensions:
  - mp3
  - ogg
  - opus
  - wav
# List of users and their passwords. The password must be bcrypt-hashed.
users:
  # username: bcrypt-hashed password
  alice: "$2b$12$Z4fsPunIRWgQuYNzds8d6OngVfk0I2k0y8otasGbcZT//H1.rPIBS" # pw = password1
# The secret key is used to sign cookies and stream password, and should be a long random string
secret_key: "CHANGE_ME_IN_FAVOUR_OF_A_LONG_PASSWORD"
# Protocol used to serve the files. Can be either http or https
protocol: https
# Optional: How file downloads/streams are delivered to the client. Default: direct
# - direct:    Flask serves the bytes itself (send_file). Zero-config, but ties up a worker
#              for the whole transfer and can time out on large files. Fine for small setups.
# - xaccel:    Flask only authorizes the request and hands the file to nginx via
#              X-Accel-Redirect. nginx serves the bytes (kernel sendfile, range/resume).
#              Recommended for production. Requires an `internal` nginx location (see README).
# - xsendfile: Same idea for Apache (mod_xsendfile) / Lighttpd via the X-Sendfile header.
#              Requires XSendFilePath whitelisting the media_root (see README).
# download_method: direct
# Optional: internal URI namespace used for X-Accel-Redirect (xaccel only).
# Must match the `internal` location block in your nginx config. Default: /_protected
# download_internal_prefix: /_protected
# Optional: show media metadata in the browse view. For video, reads Kodi-style ".nfo"
# sidecar files (title, year, rating, plot) next to each file and a "tvshow.nfo" in the
# folder. For audio, reads embedded tags (track, title, album, duration). Sorting still
# happens on file name. Default: true
# show_metadata: true
# Optional: Modified rate limits following https://flask-limiter.readthedocs.io/en/stable/configuration.html#rate-limit-string-notation
# rate_limit_default: 25 per 5 minutes
# rate_limit_login: 2 per 10 seconds
# Optional: rate limit storage backend, defaults to memory://
# In the proposed Docker setup, it could be redis://home-stream-valkey:6379
# rate_limit_storage_uri: redis://localhost:6379
