# Sample nginx config for the sidecar in docker-compose.sample.yaml.
# Used with download_method: xaccel in config.yaml.

server {
    listen 80;

    location / {
        proxy_pass http://home-stream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Must match download_internal_prefix (default /_protected).
    # `internal` makes it unreachable directly — only X-Accel-Redirect can reach it.
    location /_protected/ {
        internal;
        alias /media/data/;   # same path the app sees; read-only is fine
    }
}
